<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>くまさんAR プライバシーポリシー</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      text-align: center;
      padding: 3em 1em;
      line-height: 1.6;
      background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
    }

    h1 {
      margin-bottom: 0.5em;
    }

    p {
      color: #666;
      margin-bottom: 2em;
    }

    .button {
      display: block;
      width: 220px;
      margin: 12px auto;
      padding: 14px 0;
      font-size: 1.1em;
      font-weight: 600;
      text-decoration: none;
      border-radius: 12px;
      color: white;
      transition: 0.2s;
      box-shadow: 0 6px 12px rgba(0,0,0,0.1);
    }

    .button-ja {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }

    .button-en {
      background: linear-gradient(135deg, #84fab0, #8fd3f4);
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(0,0,0,0.15);
    }

  </style>
</head>

<body>

<h1>くまさんAR プライバシーポリシー</h1>

<p>言語を選択してください<br>Please select your language</p>

<a href="./ja/" class="button button-ja">日本語</a>
<a href="./en/" class="button button-en">English</a>

</body>
</html>
